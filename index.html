<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game News Hub</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">RSS powered game media reader</p>
        <h1>Game News Hub</h1>
      </div>
      <button id="refreshButton" class="icon-button" type="button" aria-label="最新記事を再取得" title="最新記事を再取得">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <main>
      <section class="toolbar" aria-label="記事フィルター">
        <label class="search-box">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="タイトル、媒体名、概要">
        </label>
        <label class="select-box">
          <span>媒体</span>
          <select id="sourceFilter">
            <option value="all">すべて</option>
          </select>
        </label>
      </section>

      <section class="status-row" aria-live="polite">
        <p id="statusText">記事を読み込み中...</p>
        <p id="updatedText"></p>
      </section>

      <section id="newsGrid" class="news-grid" aria-label="最新ゲームニュース"></section>
    </main>

    <template id="articleTemplate">
      <article class="news-card">
        <img class="thumbnail" alt="" loading="lazy">
        <div class="card-meta">
          <span class="source"></span>
          <time></time>
        </div>
        <h2></h2>
        <p></p>
        <a target="_blank" rel="noopener noreferrer">記事を読む</a>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
